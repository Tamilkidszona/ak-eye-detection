<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK Eye Disease Detection</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container { padding: 20px; width: 100%; }
    h1 { font-size: 36px; margin-bottom: 20px; color: #38bdf8; }
    .card {
      width: min(500px, 90vw);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin: 0 auto;
    }
    input[type=file] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px dashed #64748b;
      background: #0f172a;
      color: #cbd5e1;
      margin-bottom: 20px;
      cursor: pointer;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }
    button:disabled { background: #4b5563; }
    #result {
      margin-top: 25px;
      font-size: 16px;
      padding: 20px;
      border-radius: 8px;
      background: rgba(56, 189, 248, 0.1);
      text-align: left; 
      font-family: 'Courier New', Courier, monospace; 
      white-space: pre-wrap; 
      border-left: 4px solid #38bdf8;
    }
    .status { margin-top: 15px; font-size: 14px; color: #fbbf24; font-weight: bold; }
  </style>
</head>

<body>
  <div class="container">
    <h1>👁️ AK Eye Detection</h1>
    <div class="card">
      <input type="file" id="imageInput" accept="image/*" />
      <button id="predictBtn" onclick="sendToMATLAB()">Initialize AI Scan</button>
      <div class="status" id="status">Status: Waiting for Image...</div>
      <div id="result" style="display: none;"></div>
    </div>
  </div>

  <script>
    // YOUR CURRENT NGROK URL FROM SCREENSHOT
    const MATLAB_SERVER_URL = "https://racemose-angelic-overearnestly.ngrok-free.dev/predict";

    async function sendToMATLAB() {
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const fileInput = document.getElementById("imageInput");
      const btn = document.getElementById("predictBtn");

      if (!fileInput.files[0]) {
        alert("Please select a photo first!");
        return;
      }

      try {
        btn.disabled = true;
        btn.innerText = "Processing...";
        statusEl.textContent = "Connecting to MATLAB Server...";
        resultEl.style.display = "none";

        // Convert image to Base64
        const reader = new FileReader();
        reader.readAsDataURL(fileInput.files[0]);
        reader.onload = async () => {
          const base64Image = reader.result;

          const response = await fetch(MATLAB_SERVER_URL, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "ngrok-skip-browser-warning": "69420" 
            },
            body: JSON.stringify({ image: base64Image })
          });

          const data = await response.json();
          statusEl.textContent = "Analysis Complete ✅";
          resultEl.innerHTML = data.result.replace(/\n/g, "<br>");
          resultEl.style.display = "block";
          btn.disabled = false;
          btn.innerText = "Initialize AI Scan";
        };
      } catch (err) {
        statusEl.textContent = "Connection Failed ❌";
        resultEl.innerHTML = "Error: Ensure your Python Bridge and Ngrok are running on your laptop.";
        resultEl.style.display = "block";
        btn.disabled = false;
        btn.innerText = "Initialize AI Scan";
      }
    }
  </script>
</body>
</html>
