<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK Eye Disease Detection</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      padding: 20px;
      width: 100%;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 20px;
      color: #38bdf8;
    }
    .card {
      width: min(500px, 90vw);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin: 0 auto;
    }
    input[type=file] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px dashed #64748b;
      background: #0f172a;
      color: #cbd5e1;
      margin-bottom: 20px;
      cursor: pointer;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, background 0.2s;
    }
    button:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      background: #4b5563;
      cursor: not-allowed;
      transform: none;
    }
    #result {
      margin-top: 25px;
      font-size: 16px;
      font-weight: normal;
      color: #f0f9ff;
      padding: 20px;
      border-radius: 8px;
      background: rgba(56, 189, 248, 0.1);
      text-align: left; 
      font-family: 'Courier New', Courier, monospace; 
      white-space: pre-wrap; 
      line-height: 1.6;
      border-left: 4px solid #38bdf8;
    }
    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #fbbf24;
      font-weight: bold;
    }
    .footer-note {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>👁️ AK Eye Detection</h1>

    <div class="card">
      <input type="file" id="imageInput" accept="image/*" />
      <button id="predictBtn" onclick="sendToMATLAB()">Initialize AI Scan</button>

      <div class="status" id="status">Status: Waiting for Image...</div>
      <div id="result" style="display: none;"></div>

      <div class="footer-note">
        Securely connected to Python-MATLAB Bridge via Ngrok
      </div>
    </div>
  </div>

  <script>
    // =========================================================
    // ✅ YOUR LIVE NGROK LINK IS RIGHT HERE!
    // =========================================================
    const MATLAB_SERVER_URL = "https://racemose-angelic-overearnestly.ngrok-free.dev/predict";

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendToMATLAB() {
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const fileInput = document.getElementById("imageInput");
      const btn = document.getElementById("predictBtn");

      if (!fileInput.files[0]) {
        alert("Please select a patient scan first!");
        return;
      }

      try {
        // UI Updates for loading
        btn.disabled = true;
        btn.innerText = "Processing...";
        statusEl.textContent = "Connecting to MATLAB Server...";
        statusEl.style.color = "#38bdf8";
        resultEl.style.display = "none"; 

        const dataUrl = await fileToBase64(fileInput.files[0]);

        // The Fetch Call to your Live Ngrok Link
        const response = await fetch(MATLAB_SERVER_URL, {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "ngrok-skip-browser-warning": "69420" 
          },
          body: JSON.stringify({ image: dataUrl })
        });

        if (!response.ok) {
          throw new Error(`Server Error: ${response.status}`);
        }

        const data = await response.json();
        
        // --- FORMATTING THE PERCENTAGES ---
        let formattedText = data.result || "No data received.";
        formattedText = formattedText.replace(/\n/g, "<br>");
        formattedText = formattedText.replace(/\*(.*?)\*/g, "<strong>$1</strong>");
        
        statusEl.textContent = "Analysis Complete ✅";
        statusEl.style.color = "#4ade80";
        
        resultEl.innerHTML = formattedText; 
        resultEl.style.display = "block"; 

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Connection Failed ❌";
        statusEl.style.color = "#f87171";
        
        resultEl.innerHTML = `<strong>Error:</strong> Could not reach the MATLAB server. Please ensure Python and Ngrok are running on your laptop.`;
        resultEl.style.display = "block";
        resultEl.style.color = "#f87171";
      } finally {
        btn.disabled = false;
        btn.innerText = "Initialize AI Scan";
      }
    }
  </script>
</body>
</html>
