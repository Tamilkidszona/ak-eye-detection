<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK Eye Disease Detection</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:#fff;
      text-align:center;
      margin:0;
      padding:0;
    }
    .container{
      margin-top:110px;
      padding:20px;
    }
    h1{
      font-size:42px;
      margin-bottom:30px;
    }
    .card{
      width:min(520px, 92vw);
      margin:0 auto;
      background:#111827;
      border:1px solid #1f2937;
      border-radius:14px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }
    input[type=file]{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0b1220;
      color:#fff;
      margin-bottom:16px;
    }
    button{
      width:100%;
      padding:14px 18px;
      background:#22c55e;
      border:none;
      border-radius:10px;
      color:#08110a;
      font-size:18px;
      cursor:pointer;
      font-weight:700;
    }
    button:hover{ opacity:0.9; }
    #result{
      margin-top:18px;
      font-size:20px;
      color:#93c5fd;
      min-height:28px;
    }
    .small{
      margin-top:12px;
      font-size:13px;
      color:#cbd5e1;
      opacity:0.9;
      line-height:1.4;
    }
    .status{
      margin-top:10px;
      font-size:14px;
      color:#fbbf24;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>👁️ AK Eye Disease Detection</h1>

    <div class="card">
      <input type="file" id="imageInput" accept="image/*" />
      <button onclick="sendToMATLAB()">Detect Disease</button>

      <div id="result">Result will appear here...</div>
      <div class="status" id="status"></div>

      <div class="small">
        ✅ Connected to AI Server securely via ngrok.
      </div>
    </div>
  </div>

  <script>
    // ✅ YOUR LIVE NGROK LINK IS HERE:
    const MATLAB_SERVER_URL = "https://racemose-angelic-overearnestly.ngrok-free.dev/predict";

    async function fileToBase64(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result); // data:image/...;base64,xxxx
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendToMATLAB(){
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const file = document.getElementById("imageInput").files[0];

      if(!file){
        alert("Upload Image First");
        return;
      }

      try{
        statusEl.textContent = "Uploading to AI server...";
        resultEl.textContent = "Processing...";

        // Convert image file to base64 so we can send to MATLAB
        const dataUrl = await fileToBase64(file);

        const response = await fetch(MATLAB_SERVER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: dataUrl })
        });

        if(!response.ok){
          const t = await response.text();
          throw new Error("Server error: " + response.status + " " + t);
        }

        const data = await response.json();
        statusEl.textContent = "Done ✅";
        resultEl.textContent = "Result: " + (data.result ?? "No result returned");

      }catch(err){
        statusEl.textContent = "Failed ❌";
        resultEl.textContent = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
