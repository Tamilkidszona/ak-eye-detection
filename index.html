<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Eye Diagnostic System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Sleek dark background */
            margin: 0;
            padding: 0;
            color: #fff;
        }
        header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        h1 { margin: 0; font-size: 28px; color: #38bdf8; }
        p { margin: 5px 0 0 0; font-size: 14px; color: #cbd5e1; }
        
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 1px solid #334155;
        }

        .upload-section {
            border: 2px dashed #64748b;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background-color: #0f172a;
        }
        
        .upload-btn {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.3s;
        }
        .upload-btn:hover { background-color: #0ea5e9; }
        
        .predict-btn {
            background-color: #22c55e;
            color: white;
            width: 100%;
            display: none; 
            font-size: 18px;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .predict-btn:hover { background-color: #16a34a; }
        .predict-btn:disabled { background-color: #4b5563; cursor: not-allowed; }

        input[type="file"] { display: none; }
        
        #imagePreview {
            max-width: 300px;
            border-radius: 8px;
            margin: 20px auto 0 auto;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #loader {
            display: none;
            text-align: center;
            padding: 30px 0;
            color: #38bdf8;
        }
        .spinner {
            border: 5px solid #334155;
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .results-section {
            display: none;
            background: #0f172a;
            padding: 25px;
            border-radius: 8px;
            border-left: 5px solid #38bdf8;
        }
        
        /* THIS FIXES THE SQUISHED TEXT */
        #medicalReport {
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            line-height: 1.6;
            color: #f8fafc;
        }
        
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <h1>👁️ Clinical Eye Diagnostic Portal</h1>
        <p>Powered by Advanced Deep Learning & MATLAB</p>
    </header>

    <div class="container">
        <div class="upload-section">
            <h3 style="margin-top:0; color: #f8fafc;">Patient Scan Upload</h3>
            <p style="color: #94a3b8;">Select a high-resolution retinal or external eye scan.</p>
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
            <button class="upload-btn" onclick="document.getElementById('imageInput').click()">Select Image</button>
            <img id="imagePreview" alt="Patient Eye Scan">
        </div>

        <button id="predictBtn" class="predict-btn" onclick="sendToMATLAB()">Initialize AI Scan</button>

        <div id="loader">
            <div class="spinner"></div>
            <h3 id="statusText">Connecting to MATLAB Server...</h3>
        </div>

        <div class="results-section" id="resultsBox">
            <h2 style="margin-top:0; color: #38bdf8;">Laboratory Results</h2>
            <div id="medicalReport"></div>
        </div>
        
        <div class="footer-note">
            Securely connected to Python-MATLAB Bridge via Ngrok
        </div>
    </div>

    <script>
        // ✅ YOUR LIVE NGROK LINK (Keep "/predict" at the end!)
        const MATLAB_SERVER_URL = "https://racemose-angelic-overearnestly.ngrok-free.dev/predict"; 
        
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    
                    document.getElementById('predictBtn').style.display = 'block';
                    document.getElementById('resultsBox').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function sendToMATLAB() {
            const statusText = document.getElementById("statusText");
            const loaderBox = document.getElementById("loader");
            const resultBox = document.getElementById("resultsBox");
            const reportText = document.getElementById("medicalReport");
            const fileInput = document.getElementById("imageInput");
            const btn = document.getElementById("predictBtn");

            if (!fileInput.files[0]) return;

            try {
                btn.disabled = true;
                btn.innerText = "Processing...";
                loaderBox.style.display = "block";
                resultBox.style.display = "none";
                statusText.textContent = "Analyzing structure via Neural Network...";

                const dataUrl = await fileToBase64(fileInput.files[0]);

                const response = await fetch(MATLAB_SERVER_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "69420" 
                    },
                    body: JSON.stringify({ image: dataUrl })
                });

                if (!response.ok) throw new Error(`Server Error: ${response.status}`);

                const data = await response.json();
                
                let rawText = data.result || "No data received.";
                
                // --- THE MAGIC FIX IS HERE ---
                // 1. Convert MATLAB invisible newlines to HTML <br> tags
                rawText = rawText.replace(/\n/g, "<br>");
                // 2. Convert *bold* text to HTML strong tags
                rawText = rawText.replace(/\*(.*?)\*/g, "<strong>$1</strong>");
                
                reportText.innerHTML = rawText;
                
                loaderBox.style.display = "none";
                resultBox.style.display = "block";

            } catch (err) {
                console.error(err);
                loaderBox.style.display = "none";
                resultBox.style.display = "block";
                reportText.innerHTML = `<span style="color:#ef4444;"><strong>Connection Error:</strong> Could not reach the MATLAB server. Ensure your Python script and Ngrok are running.</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Initialize AI Scan";
            }
        }
    </script>
</body>
</html>
