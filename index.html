<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK Eye Disease Detection</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      padding: 20px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 20px;
      color: #38bdf8;
    }
    .card {
      width: min(480px, 90vw);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    input[type=file] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px dashed #64748b;
      background: #0f172a;
      color: #cbd5e1;
      margin-bottom: 20px;
      cursor: pointer;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, background 0.2s;
    }
    button:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }
    #result {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      color: #f0f9ff;
      padding: 15px;
      border-radius: 8px;
      background: rgba(56, 189, 248, 0.1);
    }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #fbbf24;
    }
    .footer-note {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>👁️ AK Eye Detection</h1>

    <div class="card">
      <input type="file" id="imageInput" accept="image/*" />
      <button id="predictBtn" onclick="sendToMATLAB()">Detect Disease</button>

      <div id="result">Waiting for image...</div>
      <div class="status" id="status">Ready</div>

      <div class="footer-note">
        Connected to Secure Python-MATLAB Bridge via ngrok
      </div>
    </div>
  </div>

  <script>
    // ✅ YOUR LIVE NGROK LINK (Update this if you restart ngrok!)
    const MATLAB_SERVER_URL = "https://racemose-angelic-overearnestly.ngrok-free.dev/predict";

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendToMATLAB() {
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const fileInput = document.getElementById("imageInput");
      const btn = document.getElementById("predictBtn");

      if (!fileInput.files[0]) {
        alert("Please select an eye image first!");
        return;
      }

      try {
        // UI Updates
        btn.disabled = true;
        btn.style.background = "#4b5563";
        statusEl.textContent = "Sending to AI Server (Running MATLAB)...";
        resultEl.textContent = "Processing image...";

        const dataUrl = await fileToBase64(fileInput.files[0]);

        // ✅ The Fetch Call with ngrok-skip-browser-warning fix
        const response = await fetch(MATLAB_SERVER_URL, {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "ngrok-skip-browser-warning": "69420" 
          },
          body: JSON.stringify({ image: dataUrl })
        });

        if (!response.ok) {
          throw new Error(`Server Error: ${response.status}`);
        }

        const data = await response.json();
        
        statusEl.textContent = "Analysis Complete ✅";
        resultEl.textContent = "Result: " + (data.result || "No data");
        resultEl.style.color = "#4ade80";

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error occurred ❌";
        resultEl.textContent = "Connection Failed. Check if Python is running!";
        resultEl.style.color = "#f87171";
      } finally {
        btn.disabled = false;
        btn.style.background = "#22c55e";
      }
    }
  </script>
</body>
</html>
