<!DOCTYPE html>
<html>
<head>
<title>AK Eye Disease Detection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  text-align: center;
  color: white;
}

.container {
  margin-top: 100px;
}

h1 {
  font-size: 40px;
}

input[type=file] {
  margin: 20px;
  padding: 10px;
}

button {
  padding: 15px 30px;
  background: #22c55e;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  border-radius: 10px;
}

#result {
  margin-top: 30px;
  font-size: 25px;
  color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">
<h1>👁️ AK Eye Disease Detection</h1>

<input type="file" id="imageInput">
<br>

<button onclick="sendToMATLAB()">Detect Disease</button>

<div id="result">Result will appear here...</div>
</div>

<script>
function sendToMATLAB() {
  document.getElementById("result").innerHTML = "Processing...";
  
  fetch("http://localhost:9910/AK_Predict", {
    method: "POST"
  })
  .then(response => response.text())
  .then(data => {
    document.getElementById("result").innerHTML = data;
  })
  .catch(error => {
    document.getElementById("result").innerHTML = "MATLAB not connected!";
  });
}
</script>

</body>
</html>
